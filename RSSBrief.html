<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Brief</title>
  <link rel="stylesheet" href="RSSBrief_utils/RSSBrief_styles.css">
</head>
<body>

<div class="page-wrap">
  <div class="main-container">

    <!-- ============ HEADER ============ -->
    <div class="header-row">
      <div class="header-accent-left"></div>
      <div class="header-body">
        <div class="header-title" id="header-title"><a href="index.html" style="color:inherit;text-decoration:none;">RSS Brief</a></div>
        <div class="header-date"  id="header-date"></div>
        <div class="header-time"  id="header-time"></div>
      </div>
      <div class="header-accent-right"></div>
    </div>

    <!-- ============ STATS BAR ============ -->
    <div class="stats-bar">
      <div class="stats-count">
        <span id="stats-count-label">— ARTICLES</span>
      </div>
      <div class="stats-label">
        <div class="controls">
          <span id="filter-buttons"></span>
        </div>
        <div class="controls controls-secondary">
          <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
          <button class="sources-toggle-btn" id="sources-toggle">Sources ▾</button>
        </div>
      </div>
      <div class="stats-accent"></div>
    </div>

    <!-- ============ SOURCES PANEL ============ -->
    <div class="sources-detail" id="sources-detail"></div>

    <!-- ============ ARTICLES ============ -->
    <div id="articles-wrapper"></div>

    <!-- ============ FOOTER ============ -->
    <div class="footer-row">
      <div class="footer-yellow"></div>
      <div class="footer-body">
        <span class="footer-text"><a href="#" style="color:inherit;text-decoration:none;">RSS Brief</a> · Personal Use Only</span>
      </div>
      <div class="footer-red"></div>
      <div class="footer-blue"></div>
    </div>

  </div>
</div>

<!-- ============================================================
     CONFIGURATION
     ============================================================ -->
<script>
