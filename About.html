<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Construction</title>
  <style>
    :root {
      --red:    rgb(217, 33, 33);
      --blue:   rgb(27, 75, 154);
      --yellow: rgb(247, 213, 0);
      --black:  #1A1A1A;
      --white:  #FFFFFF;
      --grey:   #666666;
      --border-thick: 4px solid #1A1A1A;
      --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: var(--white);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      display: flex;
      max-width: 480px;
      width: calc(100% - 30px);
    }
    .accent {
      width: 8px;
      flex-shrink: 0;
      background: var(--yellow);
      border: var(--border-thick);
      border-right: none;
    }
    .body {
      flex: 1;
      border: var(--border-thick);
      padding: 40px 30px;
    }
    h1 {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: -0.5px;
      margin: 0 0 10px;
      color: var(--black);
    }
    p {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--grey);
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="accent"></div>
    <div class="body">
      <h1><a href="index.html" style="color:inherit;text-decoration:none;">Under Construction</a></h1>
      <p>Check back soon</p>
    </div>
  </div>
</body>
</html>
