<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Brief</title>
  <link rel="stylesheet" href="WeatherBrief_utils/WeatherBrief_styles.css">
</head>
<body>

<!-- ============ LOADING OVERLAY ============ -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-card">
    <div class="loading-accent" id="loading-accent"></div>
    <div class="loading-body" id="loading-body">
      <h1 class="loading-title"><a href="index.html" style="color:inherit;text-decoration:none;">Weather Brief</a></h1>
      <p class="loading-status" id="loading-status">Requesting location access</p>
      <!-- Zip code fallback — hidden by default, revealed into the same card -->
      <div class="loading-zip-row" id="loading-zip-row">
        <input type="text" id="zip-input" class="zip-input" placeholder="Enter ZIP code" maxlength="5" inputmode="numeric" pattern="[0-9]*">
        <button id="zip-go" class="zip-go">Go →</button>
      </div>
    </div>
  </div>
</div>

<div class="page-wrap">
  <div class="main-container">

    <!-- ============ HEADER ============ -->
    <div class="header-row">
      <div class="header-accent-left"></div>
      <div class="header-body">
        <div class="header-title" id="header-title"><a href="index.html" style="color:inherit;text-decoration:none;">Weather Brief</a></div>
        <div class="header-date"  id="header-date"></div>
        <div class="header-time"  id="header-time"></div>
      </div>
      <div class="header-accent-right"></div>
    </div>

    <!-- ============ STATS BAR ============ -->
    <div class="stats-bar">
      <div class="stats-count" id="location-label">
        <span>WEATHER BRIEF</span>
      </div>
      <div class="stats-label">
        <div class="controls">
          <span id="filter-buttons"></span>
        </div>
        <div class="controls controls-secondary">
          <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
          <span class="last-updated" id="last-updated"></span>
        </div>
      </div>
      <div class="stats-accent"></div>
    </div>

    <!-- ============ CONTENT ============ -->
    <div id="content-wrapper"></div>

    <!-- ============ FOOTER ============ -->
    <div class="footer-row">
      <div class="footer-yellow"></div>
      <div class="footer-body">
        <span class="footer-text"><a href="#" style="color:inherit;text-decoration:none;">Weather Brief</a> · Personal Use Only</span>
      </div>
      <div class="footer-red"></div>
      <div class="footer-blue"></div>
    </div>

  </div>
</div>

<!-- ============================================================
     CONFIGURATION
     ============================================================ -->
<script>
window.WEATHER_CONFIG = {
  title: "Weather Brief",
  cacheTTLMinutes: 15,
  units: "imperial",
};
</script>
<script src="WeatherBrief_utils/WeatherBrief_script.js"></script>
</body>
</html>
